# ============================================================================
# Mercury Network Configuration
# ============================================================================
# Edit this file before running deploy.sh on each server.
#
# INSTRUCTIONS:
# 1. Update NODES below with the actual IPs of your 4 servers
# 2. Copy the entire mercury/ directory to all servers
# 3. Run on server 1 (primary):  ./deploy.sh --node 1
# 4. Run on servers 2,3,4:       ./deploy.sh --node 2 (or 3, 4)
# ============================================================================

# --- Chain Settings ---
CHAIN_ID="mercury_9001-1"
KEYRING="test"                    # "test" for testnet, "file" for production
KEYALGO="eth_secp256k1"
BASEFEE=10000000
CHAIN_HOME="$HOME/.mercuryd"

# --- SSH Settings ---
# SSH user on all servers (must be the same, or override per-node)
SSH_USER="root"
# Uncomment if using a custom SSH key:
# SSH_KEY="~/.ssh/id_rsa"

# --- Nodes ---
# Format: NODE_<N>_IP and NODE_<N>_MONIKER
# Node 1 is the PRIMARY — it creates genesis and collects gentxs
NODE_COUNT=4

NODE_1_IP="10.199.94.107"
NODE_1_MONIKER="validator-1"

NODE_2_IP="10.0.0.2"
NODE_2_MONIKER="validator-2"

NODE_3_IP="10.0.0.3"
NODE_3_MONIKER="validator-3"

NODE_4_IP="10.0.0.4"
NODE_4_MONIKER="validator-4"
